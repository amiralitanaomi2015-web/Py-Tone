{% extends "base.html" %}
{% block title %}{{ article.title }}{% endblock %}
{% block content %}
<div class="card" style="max-width:760px;margin:0 auto;">
  <span class="badge badge-level">{{ article.level }}</span>
  <h1 style="margin-top:14px;">{{ article.title }}</h1>
  <div class="article-content">
    {{ article.content_md | markdown | safe }}
  </div>
</div>
<div style="max-width:760px;margin:20px auto 0;display:flex;justify-content:space-between;">
  <a href="{{ url_for('learn') }}" class="btn btn-ghost">← بازگشت به فهرست</a>
  <a href="{{ url_for('ai_tutor_page') }}" class="btn btn-mint">سوالی داری؟ از معلم هوش مصنوعی بپرس</a>
</div>
{% endblock %}
