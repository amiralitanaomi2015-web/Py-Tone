{% extends "base.html" %}
{% block title %}ورود{% endblock %}
{% block content %}
<div class="form-wrap card">
  <h2>ورود به Py Tone</h2>
  <form method="POST">
    <label>ایمیل</label>
    <input type="email" name="email" required autofocus>
    <label>رمز عبور</label>
    <input type="password" name="password" required>
    <button type="submit" class="btn btn-primary btn-block" style="margin-top:24px;">ورود</button>
  </form>
  <p class="form-foot">حساب نداری؟ <a href="{{ url_for('register') }}" style="color:var(--accent-mint)">ثبت‌نام کن</a></p>
</div>
{% endblock %}
