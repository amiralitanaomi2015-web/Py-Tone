{% extends "base.html" %}
{% block title %}پلی‌گراند{% endblock %}
{% block content %}
<div class="section-title"><h2>پلی‌گراند اجرای کد پایتون</h2></div>
<p style="margin-top:-10px;">کد پایتونت رو بنویس و بزن اجرا. (نسخه‌ی آموزشی؛ برخی import‌های حساس برای امنیت غیرفعال هستند.)</p>

<div class="playground-wrap">
  <div>
    <textarea id="code-editor" spellcheck="false">print("سلام از Py Tone!")

for i in range(5):
    print("شمارش:", i)
</textarea>
    <button id="run-btn" class="btn btn-primary" style="margin-top:12px;">▶ اجرای کد</button>
  </div>
  <div>
    <div id="code-output">خروجی کد اینجا نمایش داده می‌شود...</div>
  </div>
</div>

<script>
document.getElementById('run-btn').addEventListener('click', async function () {
  const btn = this;
  const code = document.getElementById('code-editor').value;
  const out = document.getElementById('code-output');
  btn.disabled = true;
  btn.textContent = 'در حال اجرا...';
  out.textContent = '';
  try {
    const res = await fetch("{{ url_for('playground_run') }}", {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({code})
    });
    const data = await res.json();
    out.textContent = data.output || data.error || '(بدون خروجی)';
  } catch (e) {
    out.textContent = 'خطا در ارتباط با سرور.';
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ اجرای کد';
  }
});
</script>
{% endblock %}
