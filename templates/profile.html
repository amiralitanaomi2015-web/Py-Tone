{% extends "base.html" %}
{% block title %}پروفایل{% endblock %}
{% block content %}
<div class="form-wrap card">
  <h2>پروفایل من</h2>
  <p style="font-size:13.5px;">{{ user.first_name }} {{ user.last_name }} &middot; {{ user.email }}</p>
  <p style="font-size:13.5px;">پلن فعلی: <strong style="color:var(--accent-gold)">{{ user.plan }}</strong></p>

  <form method="POST">
    <label>زبان ترجیحی برای آموزش و معلم هوش مصنوعی</label>
    <select name="preferred_language">
      {% for code, label in languages %}
      <option value="{{ code }}" {{ 'selected' if user.preferred_language == code }}>{{ label }}</option>
      {% endfor %}
    </select>
    <button type="submit" class="btn btn-primary btn-block" style="margin-top:20px;">ذخیره</button>
  </form>
</div>
{% endblock %}
