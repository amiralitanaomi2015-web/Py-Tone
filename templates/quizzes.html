{% extends "base.html" %}
{% block title %}کوییزها{% endblock %}
{% block content %}
<div class="section-title"><h2>کوییزها و سوالات امتحانی</h2></div>
<div class="grid-3">
  {% for q in quizzes %}
  <div class="card">
    <span class="badge {{ 'badge-free' if q.is_free else 'badge-locked' }}">{{ 'رایگان' if q.is_free else 'پلن ویژه' }}</span>
    <h3 style="margin-top:12px;">{{ q.title }}</h3>
    <p>{{ q.topic }} &middot; {{ q.questions|length }} سوال</p>
    <a href="{{ url_for('quiz_take', quiz_id=q.id) }}" class="btn btn-primary btn-block">شروع کوییز</a>
  </div>
  {% endfor %}
</div>
{% endblock %}
