{% extends "base.html" %}
{% block title %}ثبت‌نام{% endblock %}
{% block content %}
<div class="form-wrap card">
  <h2>ساخت حساب رایگان</h2>
  <form method="POST">
    <label>نام</label>
    <input type="text" name="first_name" required autofocus>
    <label>نام خانوادگی</label>
    <input type="text" name="last_name">
    <label>ایمیل</label>
    <input type="email" name="email" required>
    <label>رمز عبور</label>
    <input type="password" name="password" required minlength="6">
    <button type="submit" class="btn btn-primary btn-block" style="margin-top:24px;">ثبت‌نام رایگان</button>
  </form>
  <p class="form-foot">قبلا ثبت‌نام کردی؟ <a href="{{ url_for('login') }}" style="color:var(--accent-mint)">وارد شو</a></p>
</div>
{% endblock %}
